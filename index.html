<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Store View — Faherty Brand</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.5/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{min-height:100vh;background:#0B0E11}
    body{font-family:'Space Grotesk',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;color:#E6EDF3}
    ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#30363D;border-radius:3px}
    button{font-family:inherit;cursor:pointer}table{border-spacing:0}
    .sc{transition:border-color .2s,background .2s,transform .15s}.sc:hover{border-color:#58A6FF!important;background:#1C222B!important;transform:translateY(-1px)}
    .pr:hover{background:#1A1F2688}.pill:hover{background:#21262D!important}
    .nb{transition:all .15s}.nb:hover{background:#58A6FF14!important;color:#58A6FF!important}
    @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fu{animation:fu .35s ease-out both}
    @keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin 1s linear infinite}
    .nso-card{border-color:#D29922!important;background:#161B22!important}
    .nso-card:hover{border-color:#D29922!important;background:#1C222B!important}
    .sort-btn{transition:all .15s}.sort-btn:hover{background:#21262D!important}
    .sort-btn.active{background:#1F6FEB22!important;color:#58A6FF!important;border-color:#1F6FEB!important}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
const{useState,useMemo,useEffect,Fragment:F}=React;
const DATA_URL="data.json";
const C={bg:"#0B0E11",srf:"#12161B",card:"#161B22",brd:"#21262D",brl:"#30363D",txt:"#E6EDF3",tm:"#8B949E",td:"#6E7681",ac:"#58A6FF",acd:"#1F6FEB",g:"#3FB950",y:"#D29922",r:"#F85149",o:"#DB6D28",p:"#BC8CFF"};

function useData(){const[d,setD]=useState(null);const[l,setL]=useState(true);const[e,setE]=useState(null);useEffect(()=>{fetch(DATA_URL).then(r=>{if(!r.ok)throw new Error(r.status);return r.json()}).then(x=>{setD(x);setL(false)}).catch(x=>{setE(x.message);setL(false)})},[]);return{data:d,loading:l,error:e}}

const fmt=n=>n==null?'—':typeof n==='number'?Math.round(n).toLocaleString():n;
const fmtD=n=>n==null?'—':'$'+Math.round(n).toLocaleString();
const pct=(a,b)=>b&&b!==0?((a/b-1)*100).toFixed(1):null;
const DIVS_CORE=["Mens","Womens","Accessories","Footwear","Kids","Non Apparel"];
const PLS=["Full Price","Markdown"];
const TFS=["LCW","L4W","L8W","L12W","STD"];

// NSO detection: stores with 0 OH or very low STD sales relative to OH
function isNSO(stot){return stot && (stot.oh===0 || (stot.std < 50 && stot.oh > 0) || stot.wos > 100)}

// ═══ ATOMS ═══
function Pill({children,active,onClick,small,color,style:sx}){
  return <button className="pill" onClick={onClick} style={{padding:small?"3px 10px":"5px 14px",borderRadius:6,border:`1px solid ${active?(color||C.ac):C.brd}`,background:active?(color||C.acd)+"22":"transparent",color:active?(color||C.ac):C.tm,fontSize:small?11:12,fontWeight:active?600:500,transition:"all .15s",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".02em",...sx}}>{children}</button>;
}

function MC({label,value,sub,trend,small,children}){
  return <div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:10,padding:small?"14px 16px":"20px 22px",flex:1,minWidth:small?140:180}}>
    <div style={{fontSize:11,color:C.td,textTransform:"uppercase",letterSpacing:".08em",fontFamily:"'JetBrains Mono',monospace",marginBottom:8}}>{label}</div>
    <div style={{fontSize:small?22:28,fontWeight:700,color:C.txt,fontFamily:"'Space Grotesk',sans-serif",lineHeight:1.1}}>{value}</div>
    {sub&&<div style={{fontSize:11,color:C.tm,marginTop:6}}>{sub}</div>}
    {trend!=null&&<div style={{fontSize:11,marginTop:6,color:parseFloat(trend)>=0?C.g:C.r,fontFamily:"'JetBrains Mono',monospace"}}>{parseFloat(trend)>=0?"▲":"▼"} {Math.abs(parseFloat(trend))}% vs LY</div>}
    {children}
  </div>;
}

function HB({score}){const c=score==="Healthy"?C.g:score==="At Risk"?C.y:C.r;return <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:5,background:c+"18",color:c,fontSize:11,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}><span style={{width:6,height:6,borderRadius:"50%",background:c,display:"inline-block"}}/>{score}</span>}
function AB({action}){const m={"Fulfill":{b:C.g+"20",c:C.g,i:"✓"},"Partial":{b:C.y+"20",c:C.y,i:"◐"},"None Avail":{b:C.r+"18",c:C.r,i:"✕"},"Stocked":{b:C.td+"18",c:C.td,i:"—"}};const s=m[action]||m.Stocked;return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:4,background:s.b,color:s.c,fontSize:10,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>{s.i} {action}</span>}

const th={textAlign:"left",padding:"8px 10px",color:C.td,fontWeight:500,fontSize:10,textTransform:"uppercase",letterSpacing:".06em"};
const td_s={padding:"7px 10px",color:C.tm};

// ═══ MINI PIE CHART ═══
function MiniPie({data,size=120}){
  // data: [{label, value, color}]
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total) return null;
  const colors=[C.ac,"#3FB950","#BC8CFF","#D29922","#F85149","#DB6D28","#8B949E","#6E7681"];
  let cumAngle=0;
  const r=size/2-2;const cx=size/2;const cy=size/2;
  return <div style={{display:"flex",alignItems:"center",gap:16}}>
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {data.filter(d=>d.value>0).map((d,i)=>{
        const angle=(d.value/total)*360;
        const startAngle=cumAngle;
        cumAngle+=angle;
        if(angle>=359.9) return <circle key={i} cx={cx} cy={cy} r={r} fill={colors[i%colors.length]} opacity="0.8"/>;
        const s=startAngle*Math.PI/180;const e=(startAngle+angle)*Math.PI/180;
        const x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s);
        const x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);
        const large=angle>180?1:0;
        return <path key={i} d={`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} Z`} fill={colors[i%colors.length]} opacity="0.8"/>;
      })}
    </svg>
    <div style={{display:"flex",flexDirection:"column",gap:3}}>
      {data.filter(d=>d.value>0).sort((a,b)=>b.value-a.value).slice(0,8).map((d,i)=>
        <div key={i} style={{display:"flex",alignItems:"center",gap:6,fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>
          <span style={{width:8,height:8,borderRadius:2,background:colors[i%colors.length],flexShrink:0}}/>
          <span style={{color:C.tm}}>{d.label}</span>
          <span style={{color:C.td,marginLeft:"auto"}}>{fmt(d.value)} ({(d.value/total*100).toFixed(0)}%)</span>
        </div>
      )}
    </div>
  </div>;
}

// ═══ FILTER BARS ═══
function DivFilter({div,setDiv}){
  return <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center",marginBottom:10}}>
    <span style={{fontSize:10,color:C.td,textTransform:"uppercase",letterSpacing:".1em",fontFamily:"'JetBrains Mono',monospace",minWidth:60}}>Division</span>
    <Pill active={div==="All"} onClick={()=>setDiv("All")} small style={{fontWeight:700}}>All</Pill>
    <span style={{width:1,height:16,background:C.brd}}/>
    {DIVS_CORE.map(d=><Pill key={d} active={div===d} onClick={()=>setDiv(d)} small>{d}</Pill>)}
  </div>;
}
function PlFilter({pl,setPl}){
  return <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center",marginBottom:16}}>
    <span style={{fontSize:10,color:C.td,textTransform:"uppercase",letterSpacing:".1em",fontFamily:"'JetBrains Mono',monospace",minWidth:60}}>Pricing</span>
    <Pill active={pl==="All"} onClick={()=>setPl("All")} small style={{fontWeight:700}}>All</Pill>
    <span style={{width:1,height:16,background:C.brd}}/>
    {PLS.map(p=><Pill key={p} active={pl===p} onClick={()=>setPl(p)} small>{p}</Pill>)}
  </div>;
}
function TfFilter({tf,setTf}){
  return <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center",marginBottom:16}}>
    <span style={{fontSize:10,color:C.td,textTransform:"uppercase",letterSpacing:".1em",fontFamily:"'JetBrains Mono',monospace",minWidth:60}}>Period</span>
    {TFS.map(t=><Pill key={t} active={tf===t} onClick={()=>setTf(t)} small color={C.p}>{t}</Pill>)}
  </div>;
}

// ═══ SIZE GRID ═══
function SizeGrid({sizes,tf}){
  const entries=Object.entries(sizes).sort((a,b)=>(b[1][3]||0)-(a[1][3]||0));
  if(!entries.length) return null;
  const wkDiv=tf==="LCW"?1:tf==="L4W"?4:tf==="L8W"?8:tf==="L12W"?12:13;
  return <div style={{overflowX:"auto",marginTop:12}}>
    <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>
      <thead><tr style={{borderBottom:`1px solid ${C.brd}`}}>
        <th style={th}>Size</th><th style={th}>OH</th><th style={th}>Transit</th><th style={th}>Total</th>
        <th style={th}>Sales ({tf})</th><th style={th}>Wk Rate</th><th style={th}>8W Need</th>
        <th style={th}>Gap</th><th style={th}>PLG</th><th style={th}>Can Fill</th><th style={th}>Action</th>
      </tr></thead>
      <tbody>{entries.map(([sz,d])=>{
        const[oh,tr,plgA,u_std,u_l4w,u_lcw]=d;
        const tfU=tf==="LCW"?u_lcw:tf==="L4W"?u_l4w:u_std;
        const wkR=tfU/wkDiv;const need=Math.round(wkR*8);const avail=oh+tr;
        const gap=Math.max(0,need-avail);const fill=Math.min(gap,plgA);
        const action=gap===0?"Stocked":fill>=gap?"Fulfill":fill>0?"Partial":"None Avail";
        return <tr key={sz} style={{borderBottom:`1px solid ${C.brd}22`}}>
          <td style={td_s}><strong>{sz}</strong></td>
          <td style={td_s}>{oh}</td><td style={td_s}>{tr}</td><td style={td_s}>{oh+tr}</td>
          <td style={td_s}>{Math.round(tfU)}</td><td style={td_s}>{wkR.toFixed(1)}/wk</td><td style={td_s}>{need}</td>
          <td style={{...td_s,color:gap>0?C.r:C.tm}}>{gap}</td>
          <td style={td_s}>{plgA}</td><td style={{...td_s,color:fill>0?C.g:C.td}}>{fill}</td>
          <td style={td_s}><AB action={action}/></td>
        </tr>;
      })}</tbody>
    </table>
  </div>;
}

// ═══ LANDING PAGE ═══
function Landing({stores,stot,onSelect,dataDate}){
  const[search,setSearch]=useState("");
  const[area,setArea]=useState("All");
  const[sort,setSort]=useState("lcw");
  const areas=useMemo(()=>["All",...[...new Set(stores.map(s=>s.a))].sort()],[stores]);

  const{open,nso}=useMemo(()=>{
    let all=stores.map(s=>({...s,t:stot[s.n]||{lcw:0,std:0,wos:999,oh:0}}));
    if(area!=="All") all=all.filter(s=>s.a===area);
    if(search) all=all.filter(s=>s.n.toLowerCase().includes(search.toLowerCase())||s.a.toLowerCase().includes(search.toLowerCase()));
    const nsoList=all.filter(s=>isNSO(s.t));
    const openList=all.filter(s=>!isNSO(s.t));
    const sortFn=sort==="lcw"?(a,b)=>b.t.lcw-a.t.lcw:sort==="wos"?(a,b)=>a.t.wos-b.t.wos:sort==="oh"?(a,b)=>b.t.oh-a.t.oh:(a,b)=>a.n.localeCompare(b.n);
    openList.sort(sortFn);
    return{open:openList,nso:nsoList};
  },[stores,stot,area,search,sort]);

  const SortBtn=({k,label})=><button className={`sort-btn ${sort===k?"active":""}`} onClick={()=>setSort(k)} style={{padding:"5px 12px",borderRadius:6,border:`1px solid ${sort===k?C.acd:C.brd}`,background:"transparent",color:sort===k?C.ac:C.tm,fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>{label}</button>;

  const StoreCard=({s,isNso})=>{
    const t=s.t;const lyTrend=t.std_ly?pct(t.std,t.std_ly):null;
    return <button className={`sc fu ${isNso?"nso-card":""}`} onClick={()=>onSelect(s)} style={{background:C.card,border:`1px solid ${isNso?C.y+"55":C.brd}`,borderRadius:10,padding:"16px 18px",textAlign:"left",position:"relative",overflow:"hidden",width:"100%"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div>
          <div style={{fontSize:14,fontWeight:600,color:C.txt,fontFamily:"'Space Grotesk',sans-serif"}}>{s.n}</div>
          <div style={{fontSize:10,color:C.td,fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{s.a}</div>
        </div>
        {isNso&&<span style={{padding:"2px 8px",borderRadius:4,background:C.y+"22",color:C.y,fontSize:9,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>NSO / SEASONAL</span>}
      </div>
      {!isNso&&<div style={{display:"flex",gap:16,marginTop:8}}>
        <div><div style={{fontSize:16,fontWeight:700,color:C.txt}}>{fmt(t.lcw)}</div><div style={{fontSize:9,color:C.td}}>LCW Units</div></div>
        <div><div style={{fontSize:16,fontWeight:700,color:C.txt}}>{t.wos<50?t.wos.toFixed(1):"99+"}</div><div style={{fontSize:9,color:C.td}}>WOS</div></div>
        <div><div style={{fontSize:16,fontWeight:700,color:C.txt}}>{fmt(t.oh)}</div><div style={{fontSize:9,color:C.td}}>OH Units</div></div>
        {lyTrend!=null&&<div><div style={{fontSize:14,fontWeight:600,color:parseFloat(lyTrend)>=0?C.g:C.r}}>{parseFloat(lyTrend)>=0?"▲":"▼"}{Math.abs(parseFloat(lyTrend))}%</div><div style={{fontSize:9,color:C.td}}>vs LY</div></div>}
      </div>}
      <div style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",fontSize:16,color:C.td}}>→</div>
    </button>;
  };

  return <div style={{minHeight:"100vh",background:C.bg,padding:"32px 24px",maxWidth:1100,margin:"0 auto"}}>
    <div className="fu" style={{textAlign:"center",marginBottom:32}}>
      <div style={{fontSize:11,color:C.ac,fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",letterSpacing:".2em",marginBottom:12}}>Faherty Brand · Store Intelligence</div>
      <h1 style={{fontSize:"clamp(28px,4vw,44px)",fontWeight:700,color:C.txt,fontFamily:"'Space Grotesk',sans-serif",margin:"0 0 8px",lineHeight:1.1}}>Store View</h1>
      <p style={{fontSize:13,color:C.tm}}>{stores.length} locations · {dataDate}</p>
    </div>

    <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center",marginBottom:16}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search stores..." style={{flex:1,minWidth:180,padding:"9px 14px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:8,color:C.txt,fontSize:12,fontFamily:"'JetBrains Mono',monospace",outline:"none"}}/>
      <span style={{fontSize:10,color:C.td,fontFamily:"'JetBrains Mono',monospace"}}>Sort:</span>
      <SortBtn k="lcw" label="LCW Sales"/><SortBtn k="wos" label="WOS"/><SortBtn k="oh" label="Total OH"/><SortBtn k="alpha" label="A→Z"/>
    </div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:24}}>
      {areas.map(a=><Pill key={a} active={area===a} onClick={()=>setArea(a)} small>{a==="All"?"All Regions":a}</Pill>)}
    </div>

    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:10}}>
      {open.map(s=><StoreCard key={s.n} s={s}/>)}
    </div>

    {nso.length>0&&<div style={{marginTop:32}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <span style={{width:8,height:8,borderRadius:2,background:C.y}}/>
        <span style={{fontSize:12,fontWeight:600,color:C.y,fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",letterSpacing:".08em"}}>New Store Openings / Seasonal</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:10}}>
        {nso.map(s=><StoreCard key={s.n} s={s} isNso/>)}
      </div>
    </div>}
  </div>;
}

// ═══ HOME DASHBOARD ═══
function Home({store,data}){
  const[div,setDiv]=useState("All");
  const[pl,setPl]=useState("All");
  const agg=data.sa[store.n];
  const cats=data.cats?.[store.n]||{};
  const stot=data.stot?.[store.n]||{};
  if(!agg) return <div style={{color:C.tm}}>No data for {store.n}</div>;

  const getMetrics=()=>{
    if(div==="All"&&pl==="All") return{oh:agg.oh,tr:agg.tr,'oh$':agg['oh$'],cost:agg.cost,oh_ly:agg.oh_ly};
    if(div!=="All"&&pl==="All"){const d=agg.divs[div]||[0,0,0];return{oh:d[0],tr:d[1],'oh$':d[2]};}
    if(pl!=="All"&&div==="All"){const p=agg.pls[pl]||[0,0,0];return{oh:p[0],tr:p[1],'oh$':p[2]};}
    return{oh:'—',tr:'—','oh$':'—'};
  };
  const m=getMetrics();

  // Pie chart data
  const pieData=useMemo(()=>{
    if(div==="All"){
      // Show by division
      return Object.entries(agg.divs).filter(([k])=>!["MISC","Please Review"].includes(k)).map(([k,v])=>({label:k,value:v[0]})).filter(d=>d.value>0);
    } else {
      // Show by category within division
      const divCats=cats[div]||{};
      return Object.entries(divCats).map(([k,v])=>({label:k,value:v[0]})).filter(d=>d.value>0);
    }
  },[div,agg,cats]);

  const progs=Object.values(data.pr[store.n]||{});
  const totalSalesSTD=progs.reduce((s,p)=>{if(div!=="All"&&p.i[2]!==div)return s;if(pl!=="All"&&p.i[5]!==pl)return s;return s+(p.t.STD?.[0]||0)},0);
  const totalSalesLY=progs.reduce((s,p)=>{if(div!=="All"&&p.i[2]!==div)return s;if(pl!=="All"&&p.i[5]!==pl)return s;return s+(p.t.STD?.[2]||0)},0);
  const totalLCW=progs.reduce((s,p)=>{if(div!=="All"&&p.i[2]!==div)return s;if(pl!=="All"&&p.i[5]!==pl)return s;return s+(p.t.LCW?.[0]||0)},0);
  const avgWk=Math.round(totalSalesSTD/13);
  const wos=avgWk>0?((m.oh||0)/avgWk).toFixed(1):'—';

  return <div>
    <h2 style={{fontSize:22,fontWeight:700,color:C.txt,fontFamily:"'Space Grotesk',sans-serif",margin:"0 0 4px"}}>Inventory Overview</h2>
    <p style={{color:C.tm,fontSize:13,margin:"0 0 20px"}}>{store.n} · {store.a}</p>
    <DivFilter div={div} setDiv={setDiv}/>
    <PlFilter pl={pl} setPl={setPl}/>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:12,marginBottom:16}}>
      <MC label="On Hand" value={fmt(m.oh)} sub="units" trend={m.oh_ly?pct(m.oh,m.oh_ly):undefined}/>
      <MC label="In Transit" value={fmt(m.tr)}/>
      <MC label="OH Retail $" value={fmtD(m['oh$'])}/>
      <MC label="WOS" value={wos} sub="weeks of supply"/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:12,marginBottom:24}}>
      <MC label="STD Sales" value={fmt(Math.round(totalSalesSTD))} sub="13W units" trend={totalSalesLY?pct(totalSalesSTD,totalSalesLY):undefined} small/>
      <MC label="Avg Wk Sales" value={fmt(avgWk)} sub="units/week" small/>
      <MC label="LCW Sales" value={fmt(Math.round(totalLCW))} sub="last week" small/>
      {m.cost?<MC label="OH at Cost" value={fmtD(m.cost)} small/>:null}
    </div>
    {pieData.length>0&&<div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:10,padding:"20px 24px"}}>
      <div style={{fontSize:11,color:C.td,textTransform:"uppercase",letterSpacing:".08em",fontFamily:"'JetBrains Mono',monospace",marginBottom:14}}>
        {div==="All"?"OH Units by Division":`OH Units by Category — ${div}`}
      </div>
      <MiniPie data={pieData} size={130}/>
    </div>}
  </div>;
}

// ═══ TOP PROGRAMS ═══
function Programs({store,data}){
  const[div,setDiv]=useState("All");
  const[pl,setPl]=useState("All");
  const[tf,setTf]=useState("L4W");
  const[viewMode,setViewMode]=useState("style"); // "style" or "sku"
  const[expId,setExpId]=useState(null);

  const{styleProgs,skuProgs}=useMemo(()=>{
    const raw=Object.entries(data.pr[store.n]||{});
    // SKU-level
    const skus=raw.map(([sku,p])=>{
      const tfD=p.t[tf]||[0,0,0,0,0,0];
      const oh=p.oh||0,tr=p.tr||0,avail=oh+tr;
      const wkDiv=tf==="LCW"?1:tf==="L4W"?4:tf==="L8W"?8:tf==="L12W"?12:13;
      const wkRate=tfD[0]/wkDiv;const need8w=Math.round(wkRate*8);const gap=Math.max(0,need8w-avail);
      const health=avail>=need8w?"Healthy":avail>=need8w*0.6?"At Risk":"Critical";
      const hasAct=Object.values(p.sz||{}).some(sd=>{const wR=(tf==="LCW"?sd[5]:tf==="L4W"?sd[4]:sd[3])/wkDiv;const nd=Math.round(wR*8),av=sd[0]+sd[1],g=Math.max(0,nd-av);return g>0&&sd[2]>0});
      return{sku,name:p.i[0],color:p.i[1],div:p.i[2],cat:p.i[3],pl:p.i[5],units:tfD[0],sales$:tfD[1],unitsLY:tfD[2],salesLY$:tfD[3],oh,tr,avail,wkRate,need8w,gap,health,hasAct,sizes:p.sz||{},tfD};
    }).filter(p=>{if(div!=="All"&&p.div!==div)return false;if(pl!=="All"&&p.pl!==pl)return false;return p.units>0||p.oh>0}).sort((a,b)=>b.units-a.units);

    // Style-level (group by name)
    const styleMap={};
    skus.forEach(s=>{
      if(!styleMap[s.name]) styleMap[s.name]={name:s.name,div:s.div,cat:s.cat,pl:s.pl,units:0,sales$:0,unitsLY:0,salesLY$:0,oh:0,tr:0,gap:0,colors:[],hasAct:false};
      const st=styleMap[s.name];
      st.units+=s.units;st.sales$+=s.sales$;st.unitsLY+=s.unitsLY;st.salesLY$+=s.salesLY$;
      st.oh+=s.oh;st.tr+=s.tr;st.gap+=s.gap;
      if(s.hasAct) st.hasAct=true;
      st.colors.push(s);
    });
    const styles=Object.values(styleMap).sort((a,b)=>b.units-a.units);

    return{styleProgs:styles,skuProgs:skus};
  },[data,store,div,pl,tf]);

  const items=viewMode==="style"?styleProgs:skuProgs;

  return <div>
    <h2 style={{fontSize:22,fontWeight:700,color:C.txt,fontFamily:"'Space Grotesk',sans-serif",margin:"0 0 4px"}}>Top Programs</h2>
    <p style={{color:C.tm,fontSize:13,margin:"0 0 20px"}}>Ranked by {tf} units · click to drill into size health</p>
    <DivFilter div={div} setDiv={setDiv}/>
    <PlFilter pl={pl} setPl={setPl}/>
    <TfFilter tf={tf} setTf={setTf}/>
    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:16}}>
      <span style={{fontSize:10,color:C.td,fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",minWidth:60}}>View</span>
      <Pill active={viewMode==="style"} onClick={()=>{setViewMode("style");setExpId(null)}} small>By Program</Pill>
      <Pill active={viewMode==="sku"} onClick={()=>{setViewMode("sku");setExpId(null)}} small>By SKU</Pill>
      <span style={{marginLeft:12,fontSize:11,color:C.td,fontFamily:"'JetBrains Mono',monospace"}}>{items.length} {viewMode==="style"?"programs":"SKUs"}</span>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {items.slice(0,50).map((p,idx)=>{
        const id=viewMode==="style"?p.name:p.sku;
        const exp=expId===id;
        const lyT=p.unitsLY?pct(p.units,p.unitsLY):null;
        return <div key={id} style={{background:C.card,border:`1px solid ${exp?C.acd:C.brd}`,borderRadius:10,overflow:"hidden",transition:"border-color .2s"}}>
          <div className="pr" onClick={()=>setExpId(exp?null:id)} style={{padding:"14px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap",borderRadius:10}}>
            <span style={{fontSize:12,fontWeight:700,color:C.td,fontFamily:"'JetBrains Mono',monospace",minWidth:28}}>#{idx+1}</span>
            <div style={{flex:1,minWidth:160}}>
              <div style={{fontSize:13,fontWeight:600,color:C.txt,fontFamily:"'Space Grotesk',sans-serif"}}>{p.name}</div>
              <div style={{fontSize:10,color:C.td,marginTop:2,fontFamily:"'JetBrains Mono',monospace"}}>
                {viewMode==="sku"?`${p.color} · `:""}{p.div} · {p.cat} · {p.pl}
                {viewMode==="style"&&p.colors?` · ${p.colors.length} color${p.colors.length>1?"s":""}`:""}</div>
            </div>
            <div style={{textAlign:"right",minWidth:70}}>
              <div style={{fontSize:15,fontWeight:700,color:C.txt,fontFamily:"'Space Grotesk',sans-serif"}}>{Math.round(p.units)}</div>
              <div style={{fontSize:9,color:C.td}}>units ({tf})</div>
            </div>
            {lyT!=null&&<span style={{fontSize:10,color:parseFloat(lyT)>=0?C.g:C.r,fontFamily:"'JetBrains Mono',monospace"}}>{parseFloat(lyT)>=0?"▲":"▼"}{Math.abs(parseFloat(lyT))}%</span>}
            <div style={{display:"flex",gap:12,alignItems:"center"}}>
              <div style={{textAlign:"center"}}><div style={{fontSize:11,fontWeight:600,color:C.tm}}>{p.oh}</div><div style={{fontSize:8,color:C.td}}>OH</div></div>
              <div style={{textAlign:"center"}}><div style={{fontSize:11,fontWeight:600,color:C.tm}}>{p.tr}</div><div style={{fontSize:8,color:C.td}}>TR</div></div>
              <div style={{textAlign:"center"}}><div style={{fontSize:11,fontWeight:600,color:p.gap>0?C.r:C.g}}>{p.gap}</div><div style={{fontSize:8,color:C.td}}>Gap</div></div>
            </div>
            {p.hasAct&&<span style={{padding:"3px 8px",borderRadius:4,background:C.ac+"18",color:C.ac,fontSize:10,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>★</span>}
            <span style={{fontSize:12,color:C.td,transform:exp?"rotate(180deg)":"none",transition:"transform .2s",display:"inline-block"}}>▾</span>
          </div>
          {exp&&<div style={{padding:"0 18px 18px",borderTop:`1px solid ${C.brd}`}}>
            {viewMode==="style"&&p.colors&&<div style={{marginTop:12}}>
              <div style={{fontSize:10,color:C.td,fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",marginBottom:8}}>By Color/SKU</div>
              {p.colors.sort((a,b)=>b.units-a.units).map(c=>{
                const clyT=c.unitsLY?pct(c.units,c.unitsLY):null;
                return <div key={c.sku} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:`1px solid ${C.brd}22`,flexWrap:"wrap"}}>
                  <div style={{flex:1,minWidth:140}}>
                    <span style={{fontSize:12,color:C.txt,fontWeight:500}}>{c.color}</span>
                    <span style={{fontSize:10,color:C.td,marginLeft:8}}>{c.sku}</span>
                  </div>
                  <span style={{fontSize:12,fontWeight:600,color:C.txt,minWidth:50,textAlign:"right"}}>{Math.round(c.units)}u</span>
                  {clyT!=null&&<span style={{fontSize:10,color:parseFloat(clyT)>=0?C.g:C.r}}>{parseFloat(clyT)>=0?"▲":"▼"}{Math.abs(parseFloat(clyT))}%</span>}
                  <span style={{fontSize:10,color:C.tm}}>OH:{c.oh} TR:{c.tr}</span>
                  <HB score={c.health}/>
                </div>;
              })}
            </div>}
            {viewMode==="sku"&&<div>
              <div style={{display:"flex",gap:20,padding:"14px 0 8px",flexWrap:"wrap"}}>
                <div><span style={{fontSize:10,color:C.td}}>Wk Rate</span><div style={{fontSize:13,fontWeight:600,color:C.txt}}>{p.wkRate.toFixed(1)} u/wk</div></div>
                <div><span style={{fontSize:10,color:C.td}}>8W Need</span><div style={{fontSize:13,fontWeight:600,color:C.txt}}>{p.need8w}</div></div>
                <div><span style={{fontSize:10,color:C.td}}>Available</span><div style={{fontSize:13,fontWeight:600,color:C.txt}}>{p.avail}</div></div>
                <div><span style={{fontSize:10,color:C.td}}>Gap</span><div style={{fontSize:13,fontWeight:600,color:p.gap>0?C.r:C.g}}>{p.gap>0?`-${p.gap}`:"OK"}</div></div>
                <div><span style={{fontSize:10,color:C.td}}>Sales $</span><div style={{fontSize:13,fontWeight:600,color:C.txt}}>{fmtD(p.sales$)}</div></div>
              </div>
              <SizeGrid sizes={p.sizes} tf={tf}/>
            </div>}
          </div>}
        </div>;
      })}
    </div>
  </div>;
}

// ═══ SMARTER OPPORTUNITIES ═══
function Opps({store,data}){
  const[div,setDiv]=useState("All");
  const[expId,setExpId]=useState(null);

  const opps=useMemo(()=>{
    const storeSkus=new Set(Object.keys(data.pr[store.n]||{}));
    // Get STYLE NAMES this store sells (for affinity matching)
    const storeStyles=new Set();
    for(const p of Object.values(data.pr[store.n]||{})) storeStyles.add(p.i[0]);

    const locNames=data.loc_names||[];
    const chainSales={};

    for(const[sn,progs] of Object.entries(data.pr)){
      if(sn===store.n) continue;
      for(const[sku,p] of Object.entries(progs)){
        // FILTER: Full Price only
        if(p.i[5]!=="Full Price") continue;
        // FILTER: Skip location-specific products not for this store
        const styleName=p.i[0];
        const isLocSpecific=locNames.some(ln=>ln.length>3&&styleName.toLowerCase().includes(ln.toLowerCase()));
        if(isLocSpecific){
          const matchesThisStore=store.n.length>3&&styleName.toLowerCase().includes(store.n.toLowerCase());
          if(!matchesThisStore) continue;
        }
        // FILTER: Skip MISC, Please Review divisions
        if(["MISC","Please Review","Non Apparel"].includes(p.i[2])) continue;

        if(!chainSales[sku]) chainSales[sku]={u:0,cnt:0,i:p.i,styleName};
        chainSales[sku].u+=(p.t.L4W?.[0]||0);
        chainSales[sku].cnt++;
      }
    }

    // Score: boost if the store already sells this STYLE (different color = good opp)
    return Object.entries(chainSales)
      .filter(([sku])=>!storeSkus.has(sku))
      .map(([sku,cs])=>{
        const avgU=cs.cnt?cs.u/cs.cnt:0;
        const hasStyleAffinity=storeStyles.has(cs.styleName);
        const score=avgU*(hasStyleAffinity?1.5:1);
        return{sku,name:cs.i[0],color:cs.i[1],div:cs.i[2],cat:cs.i[3],pl:cs.i[5],
          chainAvg:Math.round(avgU),storeCount:cs.cnt,recUnits:Math.round(avgU*1.1),
          score,hasStyleAffinity,
          priority:score>12?"High":score>6?"Medium":"Low"};
      })
      .filter(o=>{
        if(div!=="All"&&o.div!==div) return false;
        return o.chainAvg>=3;
      })
      .sort((a,b)=>b.score-a.score);
  },[data,store,div]);

  return <div>
    <h2 style={{fontSize:22,fontWeight:700,color:C.txt,fontFamily:"'Space Grotesk',sans-serif",margin:"0 0 4px"}}>New Receipt Opportunities</h2>
    <p style={{color:C.tm,fontSize:13,margin:"0 0 20px"}}>Full Price SKUs selling well across the chain · prioritized by program affinity</p>
    <DivFilter div={div} setDiv={setDiv}/>
    <div style={{fontSize:11,color:C.td,marginBottom:12,fontFamily:"'JetBrains Mono',monospace"}}>{opps.length} opportunities · Full Price only · location exclusives filtered</div>
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {opps.slice(0,40).map(o=>{
        const exp=expId===o.sku;
        const pc=o.priority==="High"?C.r:o.priority==="Medium"?C.y:C.tm;
        return <div key={o.sku} style={{background:C.card,border:`1px solid ${exp?C.o+"66":C.brd}`,borderRadius:10,overflow:"hidden"}}>
          <div className="pr" onClick={()=>setExpId(exp?null:o.sku)} style={{padding:"14px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap",borderRadius:10}}>
            <span style={{padding:"2px 8px",borderRadius:4,background:pc+"18",color:pc,fontSize:10,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>{o.priority}</span>
            <div style={{flex:1,minWidth:160}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:13,fontWeight:600,color:C.txt,fontFamily:"'Space Grotesk',sans-serif"}}>{o.name}</span>
                {o.hasStyleAffinity&&<span style={{padding:"1px 6px",borderRadius:3,background:C.g+"18",color:C.g,fontSize:9,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>SELLS THIS PROGRAM</span>}
              </div>
              <div style={{fontSize:10,color:C.td,marginTop:2,fontFamily:"'JetBrains Mono',monospace"}}>{o.color} · {o.div} · {o.cat}</div>
            </div>
            <div style={{display:"flex",gap:18,alignItems:"center"}}>
              <div style={{textAlign:"center"}}><div style={{fontSize:12,fontWeight:600,color:C.tm}}>{o.chainAvg}</div><div style={{fontSize:8,color:C.td}}>Peer L4W</div></div>
              <div style={{textAlign:"center"}}><div style={{fontSize:12,fontWeight:600,color:C.tm}}>{o.storeCount}</div><div style={{fontSize:8,color:C.td}}>Stores</div></div>
              <div style={{textAlign:"center"}}><div style={{fontSize:12,fontWeight:600,color:C.ac}}>{o.recUnits}</div><div style={{fontSize:8,color:C.td}}>Rec'd</div></div>
            </div>
            <span style={{fontSize:12,color:C.td,transform:exp?"rotate(180deg)":"none",transition:"transform .2s",display:"inline-block"}}>▾</span>
          </div>
          {exp&&<div style={{padding:"4px 18px 16px",borderTop:`1px solid ${C.brd}`,fontSize:12,color:C.tm,lineHeight:1.6}}>
            <strong style={{color:C.txt}}>{o.name}</strong> ({o.color}) averages <strong style={{color:C.txt}}>{o.chainAvg} units L4W</strong> across {o.storeCount} stores.
            {o.hasStyleAffinity?" This store already sells other colors of this program — strong fit.":" New program for this store."}
            {" "}Recommend seeding <strong style={{color:C.ac}}>{o.recUnits} units</strong>.
          </div>}
        </div>;
      })}
    </div>
  </div>;
}

// ═══ LAYOUT ═══
const NAV=[{k:"home",l:"Dashboard",i:"◻"},{k:"programs",l:"Top Programs",i:"▤"},{k:"opps",l:"Opportunities",i:"◈"}];

function StoreView({store,data,onBack}){
  const[nav,setNav]=useState("home");
  const[col,setCol]=useState(false);
  return <div style={{display:"flex",minHeight:"100vh",background:C.bg}}>
    <div style={{width:col?56:220,background:C.srf,borderRight:`1px solid ${C.brd}`,display:"flex",flexDirection:"column",transition:"width .25s",flexShrink:0,position:"sticky",top:0,height:"100vh",overflow:"hidden"}}>
      <div style={{padding:col?"16px 8px":"20px 16px",borderBottom:`1px solid ${C.brd}`}}>
        <button onClick={()=>setCol(!col)} style={{background:"none",border:"none",color:C.tm,fontSize:16,padding:4,display:"block",width:"100%",textAlign:col?"center":"left"}}>{col?"☰":"◁"}</button>
        {!col&&<F><div style={{fontSize:15,fontWeight:700,color:C.txt,fontFamily:"'Space Grotesk',sans-serif",marginTop:12}}>{store.n}</div>
        <div style={{fontSize:11,color:C.td,fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{store.a}</div></F>}
      </div>
      <div style={{padding:"12px 8px",flex:1}}>
        {NAV.map(item=><button key={item.k} className="nb" onClick={()=>setNav(item.k)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:col?"10px 0":"10px 12px",justifyContent:col?"center":"flex-start",background:nav===item.k?C.ac+"14":"transparent",border:"none",borderRadius:8,color:nav===item.k?C.ac:C.tm,fontSize:13,fontWeight:nav===item.k?600:400,fontFamily:"'Space Grotesk',sans-serif",marginBottom:4}}>
          <span style={{fontSize:16,width:20,textAlign:"center",flexShrink:0}}>{item.i}</span>{!col&&item.l}
        </button>)}
      </div>
      <div style={{padding:"12px 8px",borderTop:`1px solid ${C.brd}`}}>
        <button className="nb" onClick={onBack} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:col?"10px 0":"10px 12px",justifyContent:col?"center":"flex-start",background:"transparent",border:"none",borderRadius:8,color:C.td,fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>
          <span style={{fontSize:14}}>←</span>{!col&&"All Stores"}
        </button>
      </div>
    </div>
    <div style={{flex:1,padding:"28px 32px",maxWidth:1200,overflowX:"hidden"}}>
      {nav==="home"&&<Home store={store} data={data}/>}
      {nav==="programs"&&<Programs store={store} data={data}/>}
      {nav==="opps"&&<Opps store={store} data={data}/>}
    </div>
  </div>;
}

function Status({data}){
  return <div style={{position:"fixed",top:16,right:16,zIndex:9999}}>
    <div style={{display:"flex",alignItems:"center",gap:8,background:C.srf,border:`1px solid ${C.brd}`,borderRadius:8,padding:"8px 14px",fontSize:11,color:C.tm,fontFamily:"'JetBrains Mono',monospace"}}>
      <span style={{width:7,height:7,borderRadius:"50%",background:data?C.g:C.y}}/>
      {data?`Live · ${data.dt}`:"Loading..."}
    </div>
  </div>;
}

function App(){
  const{data,loading,error}=useData();
  const[store,setStore]=useState(null);
  if(loading) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg}}>
    <div style={{textAlign:"center"}}><div className="spin" style={{width:32,height:32,border:`3px solid ${C.brd}`,borderTopColor:C.ac,borderRadius:"50%",margin:"0 auto 16px"}}/><div style={{color:C.tm,fontSize:13,fontFamily:"'JetBrains Mono',monospace"}}>Loading...</div></div></div>;
  if(error) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg}}>
    <div style={{textAlign:"center",maxWidth:400}}><div style={{fontSize:32,marginBottom:16}}>⚠</div><div style={{color:C.r,fontSize:14,marginBottom:8}}>Failed to load data</div><div style={{color:C.tm,fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>{error}</div></div></div>;
  return <F><Status data={data}/>
    {store?<StoreView store={store} data={data} onBack={()=>setStore(null)}/>
    :<Landing stores={data.st} stot={data.stot||{}} onSelect={setStore} dataDate={data.dt}/>}
  </F>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
