<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Store View — Faherty Brand</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.5/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{min-height:100vh;background:#FAF6F1}
    body{font-family:'DM Sans',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;color:#2C3E50}
    ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#C4B5A4;border-radius:3px}
    button{font-family:inherit;cursor:pointer}table{border-spacing:0}
    .sc{transition:all .2s}.sc:hover{border-color:#1B6B93!important;box-shadow:0 4px 16px rgba(27,107,147,.12)!important;transform:translateY(-2px)}
    .pr{transition:background .15s;border-radius:10px}.pr:hover{background:rgba(27,107,147,.04)}
    .pill{transition:all .15s}.pill:hover{background:#E8DDD0!important}
    .nb{transition:all .15s}.nb:hover{background:rgba(27,107,147,.08)!important;color:#1B6B93!important}
    @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fu{animation:fu .35s ease-out both}
    @keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin 1s linear infinite}
    .sort-btn{transition:all .15s}.sort-btn:hover{background:#E8DDD0!important}
    .sort-btn.active{background:#1B6B93!important;color:#fff!important;border-color:#1B6B93!important}
    .sort-btn.disabled{opacity:.35;pointer-events:none}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
const{useState,useMemo,useEffect,Fragment:F}=React;
const DATA_URL="data.json";

// ═══ FAHERTY PALETTE ═══
const C={
  bg:"#FAF6F1",       // warm sand
  card:"#FFFFFF",      // white cards
  cardAlt:"#F5EFE7",  // sand card
  srf:"#FFFDF9",      // sidebar
  brd:"#E2D8CC",      // warm border
  brl:"#D4C8B8",      // border hover
  txt:"#1E2D3D",      // deep navy text
  tm:"#5E7282",       // muted ocean
  td:"#8FA3B1",       // dimmer
  ac:"#1B6B93",       // ocean blue (primary)
  acd:"#15587A",      // deep blue
  acl:"#E3F1F7",      // light blue bg
  coral:"#D4603A",    // faherty coral/orange
  coralL:"#FCF0EB",   // light coral bg
  g:"#2D8F5E",        // earthy green
  gL:"#EDF7F0",       // light green
  y:"#C78D20",        // golden sand
  yL:"#FDF5E5",       // light gold
  r:"#C44536",        // muted red
  rL:"#FBF0EE",       // light red
  p:"#7B6BA4",        // muted purple
};

function useData(){const[d,setD]=useState(null);const[l,setL]=useState(true);const[e,setE]=useState(null);useEffect(()=>{fetch(DATA_URL).then(r=>{if(!r.ok)throw new Error(r.status);return r.json()}).then(x=>{setD(x);setL(false)}).catch(x=>{setE(x.message);setL(false)})},[]);return{data:d,loading:l,error:e}}

const fmt=n=>n==null?'—':typeof n==='number'?Math.round(n).toLocaleString():n;
const fmtD=n=>n==null?'—':'$'+Math.round(n).toLocaleString();
const fmtK=n=>n==null?'—':Math.abs(n)>=1000?'$'+Math.round(n/1000)+'K':'$'+Math.round(n);
const pct=(a,b)=>b&&b!==0?((a/b-1)*100).toFixed(1):null;
const DIVS_CORE=["Mens","Womens","Accessories","Footwear","Kids","Non Apparel"];
const PLS=["Full Price","Markdown"];
const TFS=["LCW","L4W","L8W","L12W","STD"];
const isNSO=(sa)=>sa&&sa.oh<100;

// ═══ LOGO ═══
function Logo({size=32}){
  return <img src="logo.png" alt="Faherty" style={{height:size,objectFit:"contain"}} onError={e=>{e.target.style.display='none'}}/>;
}

function TopBar({data}){
  return <div style={{position:"fixed",top:0,right:0,left:0,height:52,background:C.srf,borderBottom:`1px solid ${C.brd}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 24px",zIndex:999}}>
    <div style={{display:"flex",alignItems:"center",gap:12}}>
      <Logo size={28}/>
      <span style={{fontSize:14,fontWeight:700,color:C.txt,letterSpacing:".03em"}}>Store View</span>
    </div>
    <div style={{display:"flex",alignItems:"center",gap:8,fontSize:11,color:C.tm,fontFamily:"'JetBrains Mono',monospace"}}>
      <span style={{width:7,height:7,borderRadius:"50%",background:data?C.g:C.y}}/>
      {data?`Data: ${data.dt}`:"Loading..."}
    </div>
  </div>;
}

// ═══ ATOMS ═══
function Pill({children,active,onClick,small,color,bold,disabled,style:sx}){
  const bg=active?(color==="coral"?C.coralL:color==="green"?C.gL:C.acl):"transparent";
  const fg=active?(color==="coral"?C.coral:color==="green"?C.g:C.ac):C.tm;
  return <button className="pill" onClick={disabled?undefined:onClick} style={{padding:small?"4px 12px":"6px 16px",borderRadius:8,border:`1px solid ${active?(color==="coral"?C.coral+"44":color==="green"?C.g+"44":C.ac+"44"):C.brd}`,background:bg,color:fg,fontSize:small?11:12,fontWeight:active||bold?600:500,transition:"all .15s",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".01em",opacity:disabled?.35:1,cursor:disabled?"default":"pointer",...sx}}>{children}</button>;
}

function MC({label,value,sub,trend,small,children}){
  return <div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:small?"14px 16px":"20px 22px",flex:1,minWidth:small?140:170,boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
    <div style={{fontSize:11,color:C.td,textTransform:"uppercase",letterSpacing:".08em",fontFamily:"'JetBrains Mono',monospace",marginBottom:8}}>{label}</div>
    <div style={{fontSize:small?20:26,fontWeight:700,color:C.txt,lineHeight:1.1}}>{value}</div>
    {sub&&<div style={{fontSize:11,color:C.tm,marginTop:6}}>{sub}</div>}
    {trend!=null&&<div style={{fontSize:11,marginTop:6,color:parseFloat(trend)>=0?C.g:C.r,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>{parseFloat(trend)>=0?"▲":"▼"} {Math.abs(parseFloat(trend))}% vs LY</div>}
    {children}
  </div>;
}

function HB({score}){const c=score==="Healthy"?C.g:score==="At Risk"?C.y:C.r;const bg=score==="Healthy"?C.gL:score==="At Risk"?C.yL:C.rL;return <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:6,background:bg,color:c,fontSize:11,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}><span style={{width:6,height:6,borderRadius:"50%",background:c,display:"inline-block"}}/>{score}</span>}
function AB({action}){const m={"Fulfill":{bg:C.gL,c:C.g,i:"✓"},"Partial":{bg:C.yL,c:C.y,i:"◐"},"None Avail":{bg:C.rL,c:C.r,i:"✕"},"Stocked":{bg:C.cardAlt,c:C.td,i:"—"}};const s=m[action]||m.Stocked;return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:5,background:s.bg,color:s.c,fontSize:10,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>{s.i} {action}</span>}

const thS={textAlign:"left",padding:"8px 10px",color:C.td,fontWeight:600,fontSize:10,textTransform:"uppercase",letterSpacing:".06em"};
const tdS={padding:"7px 10px",color:C.tm};

// ═══ MINI PIE ═══
function MiniPie({data,size=130}){
  const total=data.reduce((s,d)=>s+d.value,0);if(!total)return null;
  const colors=[C.ac,C.coral,C.g,C.y,C.p,"#5EA4BD","#A0785A",C.td];
  let cum=0;const r=size/2-2;const cx=size/2;const cy=size/2;
  return <div style={{display:"flex",alignItems:"center",gap:20}}>
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {data.filter(d=>d.value>0).map((d,i)=>{
        const angle=(d.value/total)*360;const sa=cum;cum+=angle;
        if(angle>=359.9)return <circle key={i} cx={cx} cy={cy} r={r} fill={colors[i%colors.length]}/>;
        const s=sa*Math.PI/180;const e=(sa+angle)*Math.PI/180;
        const x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s),x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);
        return <path key={i} d={`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${angle>180?1:0} 1 ${x2},${y2} Z`} fill={colors[i%colors.length]}/>;
      })}
    </svg>
    <div style={{display:"flex",flexDirection:"column",gap:4}}>
      {data.filter(d=>d.value>0).sort((a,b)=>b.value-a.value).slice(0,8).map((d,i)=>
        <div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:11}}>
          <span style={{width:10,height:10,borderRadius:3,background:colors[i%colors.length],flexShrink:0}}/>
          <span style={{color:C.tm,minWidth:80}}>{d.label}</span>
          <span style={{color:C.td,fontFamily:"'JetBrains Mono',monospace",fontSize:10}}>{fmt(d.value)} ({(d.value/total*100).toFixed(0)}%)</span>
        </div>
      )}
    </div>
  </div>;
}

// ═══ FILTERS ═══
function DivFilter({div,setDiv}){
  return <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center",marginBottom:10}}>
    <span style={{fontSize:10,color:C.td,textTransform:"uppercase",letterSpacing:".1em",fontFamily:"'JetBrains Mono',monospace",minWidth:62}}>Division</span>
    <Pill active={div==="All"} onClick={()=>setDiv("All")} small bold>All</Pill>
    <span style={{width:1,height:18,background:C.brd}}/>
    {DIVS_CORE.map(d=><Pill key={d} active={div===d} onClick={()=>setDiv(d)} small>{d}</Pill>)}
  </div>;
}
function PlFilter({pl,setPl}){
  return <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center",marginBottom:16}}>
    <span style={{fontSize:10,color:C.td,textTransform:"uppercase",letterSpacing:".1em",fontFamily:"'JetBrains Mono',monospace",minWidth:62}}>Pricing</span>
    <Pill active={pl==="All"} onClick={()=>setPl("All")} small bold>All</Pill>
    <span style={{width:1,height:18,background:C.brd}}/>
    {PLS.map(p=><Pill key={p} active={pl===p} onClick={()=>setPl(p)} small>{p}</Pill>)}
  </div>;
}
function TfFilter({tf,setTf}){
  return <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center",marginBottom:16}}>
    <span style={{fontSize:10,color:C.td,textTransform:"uppercase",letterSpacing:".1em",fontFamily:"'JetBrains Mono',monospace",minWidth:62}}>Period</span>
    {TFS.map(t=><Pill key={t} active={tf===t} onClick={()=>setTf(t)} small color="coral">{t}</Pill>)}
  </div>;
}

// ═══ SIZE GRID ═══
function SizeGrid({sizes,tf}){
  const entries=Object.entries(sizes).sort((a,b)=>(b[1][3]||0)-(a[1][3]||0));if(!entries.length)return null;
  const wkDiv=tf==="LCW"?1:tf==="L4W"?4:tf==="L8W"?8:tf==="L12W"?12:13;
  return <div style={{overflowX:"auto",marginTop:12}}>
    <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>
      <thead><tr style={{borderBottom:`2px solid ${C.brd}`}}><th style={thS}>Size</th><th style={thS}>OH</th><th style={thS}>Transit</th><th style={thS}>Total</th><th style={thS}>Sales ({tf})</th><th style={thS}>Wk Rate</th><th style={thS}>8W Need</th><th style={thS}>Gap</th><th style={thS}>PLG</th><th style={thS}>Can Fill</th><th style={thS}>Action</th></tr></thead>
      <tbody>{entries.map(([sz,d])=>{const[oh,tr,plgA,u_std,u_l4w,u_lcw]=d;const tfU=tf==="LCW"?u_lcw:tf==="L4W"?u_l4w:u_std;const wkR=tfU/wkDiv;const need=Math.round(wkR*8);const avail=oh+tr;const gap=Math.max(0,need-avail);const fill=Math.min(gap,plgA);const action=gap===0?"Stocked":fill>=gap?"Fulfill":fill>0?"Partial":"None Avail";
        return <tr key={sz} style={{borderBottom:`1px solid ${C.brd}44`}}><td style={tdS}><strong style={{color:C.txt}}>{sz}</strong></td><td style={tdS}>{oh}</td><td style={tdS}>{tr}</td><td style={tdS}>{oh+tr}</td><td style={tdS}>{Math.round(tfU)}</td><td style={tdS}>{wkR.toFixed(1)}/wk</td><td style={tdS}>{need}</td><td style={{...tdS,color:gap>0?C.r:C.tm,fontWeight:gap>0?600:400}}>{gap}</td><td style={tdS}>{plgA}</td><td style={{...tdS,color:fill>0?C.g:C.td}}>{fill}</td><td style={tdS}><AB action={action}/></td></tr>})}</tbody>
    </table>
  </div>;
}

// ═══ LANDING PAGE ═══
function Landing({stores,stot,sa,onSelect,dataDate,data}){
  const[search,setSearch]=useState("");
  const[metric,setMetric]=useState("sales_u");
  const[tf,setTf]=useState("LCW");
  const[asc,setAsc]=useState(false);
  const needsTf=!["alpha","oh"].includes(metric);

  // Compute fleet rankings for current metric/tf
  const{ranked,nsoStores}=useMemo(()=>{
    let all=stores.map(s=>{
      const t=stot[s.n]||{};const a=sa[s.n]||{};
      const tfD=t.tf||{};
      const getVal=(m,tfn)=>{
        if(m==="alpha")return 0;
        if(m==="oh")return a.oh||0;
        if(m==="wos")return t.wos||999;
        const d=tfD[tfn]||[0,0,0,0];
        if(m==="sales_u")return d[0];
        if(m==="sales_d")return d[1];
        return 0;
      };
      const val=getVal(metric,tf);
      const lyVal=(()=>{const d=(t.tf||{})[tf]||[0,0,0,0];return metric==="sales_u"?d[2]:metric==="sales_d"?d[3]:null})();
      return{...s,t,a:sa[s.n]||{},val,lyVal,isNso:isNSO(sa[s.n])};
    });

    // Filter search
    if(search) all=all.filter(x=>x.n.toLowerCase().includes(search.toLowerCase()));

    const nso=all.filter(x=>x.isNso);
    let open=all.filter(x=>!x.isNso);

    // Sort
    if(metric==="alpha") open.sort((a,b)=>asc?b.n.localeCompare(a.n):a.n.localeCompare(b.n));
    else if(metric==="wos") open.sort((a,b)=>asc?b.val-a.val:a.val-b.val);
    else open.sort((a,b)=>asc?a.val-b.val:b.val-a.val);

    // Assign fleet ranks (based on value, descending)
    const forRank=[...open].sort((a,b)=>metric==="wos"?a.val-b.val:b.val-a.val);
    const rankMap={};forRank.forEach((s,i)=>{rankMap[s.n]=i+1});
    open.forEach(s=>{s.rank=rankMap[s.n]||'—'});

    return{ranked:open,nsoStores:nso};
  },[stores,stot,sa,search,metric,tf,asc]);

  const metricLabel=metric==="sales_u"?"Sales Units":metric==="sales_d"?"Sales $":metric==="oh"?"Units OH":metric==="wos"?"WOS":"A–Z";

  const StoreCard=({s,isNso})=>{
    const tfD=(s.t?.tf||{})[tf]||[0,0,0,0];
    const lyT=s.lyVal?pct(s.val,s.lyVal):null;
    return <button className={`sc fu`} onClick={()=>onSelect(s)} style={{
      background:C.card,border:`1px solid ${isNso?C.y+"66":C.brd}`,borderRadius:14,padding:"18px 20px",textAlign:"left",
      position:"relative",overflow:"hidden",width:"100%",boxShadow:"0 1px 4px rgba(0,0,0,.04)",
    }}>
      {isNso&&<div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${C.y},${C.coral})`}}/>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
        <div>
          <div style={{fontSize:15,fontWeight:700,color:C.txt}}>{s.n}</div>
          <div style={{fontSize:11,color:C.td,fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{s.a}</div>
        </div>
        {!isNso&&s.rank&&<span style={{
          display:"inline-flex",alignItems:"center",justifyContent:"center",
          width:30,height:30,borderRadius:8,
          background:s.rank<=3?C.coral:s.rank<=10?C.acl:C.cardAlt,
          color:s.rank<=3?"#fff":s.rank<=10?C.ac:C.tm,
          fontSize:12,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",
        }}>#{s.rank}</span>}
        {isNso&&<span style={{padding:"3px 10px",borderRadius:6,background:C.yL,color:C.y,fontSize:10,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>NSO</span>}
      </div>
      {!isNso&&<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginTop:6}}>
        <div><div style={{fontSize:18,fontWeight:700,color:C.txt}}>{fmt(tfD[0])}</div><div style={{fontSize:9,color:C.td}}>Units {tf}</div></div>
        <div><div style={{fontSize:14,fontWeight:600,color:C.tm}}>{fmtK(tfD[1])}</div><div style={{fontSize:9,color:C.td}}>Sales $ {tf}</div></div>
        <div><div style={{fontSize:14,fontWeight:600,color:C.tm}}>{fmt(s.a?.oh||0)}</div><div style={{fontSize:9,color:C.td}}>OH Units</div></div>
        <div><div style={{fontSize:14,fontWeight:600,color:s.t?.wos>30?C.r:s.t?.wos>15?C.y:C.g}}>{s.t?.wos<100?s.t?.wos?.toFixed(1):"99+"}</div><div style={{fontSize:9,color:C.td}}>WOS</div></div>
      </div>}
      {!isNso&&lyT!=null&&<div style={{marginTop:8,fontSize:11,fontWeight:600,color:parseFloat(lyT)>=0?C.g:C.r,fontFamily:"'JetBrains Mono',monospace"}}>
        {parseFloat(lyT)>=0?"▲":"▼"} {Math.abs(parseFloat(lyT))}% vs LY ({metric==="sales_d"?fmtK(tfD[3]):fmt(tfD[2])})
      </div>}
    </button>;
  };

  return <div style={{minHeight:"100vh",background:C.bg,paddingTop:52}}>
    <div style={{padding:"28px 28px 32px",maxWidth:1600,margin:"0 auto"}}>
      <div className="fu" style={{textAlign:"center",marginBottom:28}}>
        <h1 style={{fontSize:"clamp(24px,3.5vw,38px)",fontWeight:700,color:C.txt,margin:"0 0 6px"}}>Fleet Overview</h1>
        <p style={{fontSize:13,color:C.tm}}>{stores.length} locations · {dataDate}</p>
      </div>

      {/* Search */}
      <div style={{maxWidth:480,margin:"0 auto 20px"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search stores..." style={{width:"100%",padding:"10px 16px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:10,color:C.txt,fontSize:13,outline:"none",boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}/>
      </div>

      {/* Sort Hub */}
      <div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:"16px 20px",marginBottom:24,boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center",marginBottom:12}}>
          <span style={{fontSize:10,color:C.td,textTransform:"uppercase",letterSpacing:".1em",fontFamily:"'JetBrains Mono',monospace",minWidth:50}}>Sort by</span>
          {[["alpha","A–Z"],["oh","Units OH"],["sales_u","Sales Units"],["sales_d","Sales $"],["wos","WOS"]].map(([k,l])=>
            <button key={k} className={`sort-btn ${metric===k?"active":""}`} onClick={()=>setMetric(k)} style={{padding:"5px 14px",borderRadius:8,border:`1px solid ${metric===k?C.ac:C.brd}`,background:metric===k?C.ac:"transparent",color:metric===k?"#fff":C.tm,fontSize:11,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>{l}</button>
          )}
          <span style={{width:1,height:20,background:C.brd,margin:"0 4px"}}/>
          <button onClick={()=>setAsc(!asc)} style={{padding:"5px 12px",borderRadius:8,border:`1px solid ${C.brd}`,background:C.cardAlt,color:C.tm,fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>{asc?"↑ Low→High":"↓ High→Low"}</button>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
          <span style={{fontSize:10,color:C.td,textTransform:"uppercase",letterSpacing:".1em",fontFamily:"'JetBrains Mono',monospace",minWidth:50}}>Period</span>
          {TFS.map(t=><button key={t} className={`sort-btn ${tf===t&&needsTf?"active":""} ${!needsTf?"disabled":""}`} onClick={()=>needsTf&&setTf(t)} style={{padding:"5px 14px",borderRadius:8,border:`1px solid ${tf===t&&needsTf?C.coral:C.brd}`,background:tf===t&&needsTf?C.coral:"transparent",color:tf===t&&needsTf?"#fff":C.tm,fontSize:11,fontWeight:600,fontFamily:"'JetBrains Mono',monospace",opacity:needsTf?1:.3,cursor:needsTf?"pointer":"default"}}>{t}</button>)}
          {!needsTf&&<span style={{fontSize:10,color:C.td,fontStyle:"italic",marginLeft:8}}>Period N/A for {metricLabel}</span>}
        </div>
      </div>

      {/* Store Grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:12}}>
        {ranked.map(s=><StoreCard key={s.n} s={s}/>)}
      </div>

      {/* NSO Section */}
      {nsoStores.length>0&&<div style={{marginTop:36}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <span style={{width:10,height:3,borderRadius:2,background:C.y}}/>
          <span style={{fontSize:13,fontWeight:700,color:C.y}}>New Store Openings / Pre-Open</span>
          <span style={{fontSize:11,color:C.td}}>({nsoStores.length} stores with &lt;100 OH units)</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:12}}>
          {nsoStores.map(s=><StoreCard key={s.n} s={s} isNso/>)}
        </div>
      </div>}
    </div>
  </div>;
}

// ═══ HOME DASHBOARD ═══
function Home({store,data}){
  const[div,setDiv]=useState("All");const[pl,setPl]=useState("All");
  const agg=data.sa[store.n];const cats=data.cats?.[store.n]||{};const stot=data.stot?.[store.n]||{};
  if(!agg)return <div style={{color:C.tm}}>No data for {store.n}</div>;
  const m=(()=>{if(div==="All"&&pl==="All")return{oh:agg.oh,tr:agg.tr,'oh$':agg['oh$'],cost:agg.cost,oh_ly:agg.oh_ly};if(div!=="All"&&pl==="All"){const d=agg.divs[div]||[0,0,0];return{oh:d[0],tr:d[1],'oh$':d[2]};}if(pl!=="All"&&div==="All"){const p=agg.pls[pl]||[0,0,0];return{oh:p[0],tr:p[1],'oh$':p[2]};}return{oh:'—',tr:'—','oh$':'—'}})();
  const pieData=useMemo(()=>{if(div==="All")return Object.entries(agg.divs).filter(([k])=>!["MISC","Please Review"].includes(k)).map(([k,v])=>({label:k,value:v[0]})).filter(d=>d.value>0);const dc=cats[div]||{};return Object.entries(dc).map(([k,v])=>({label:k,value:v[0]})).filter(d=>d.value>0)},[div,agg,cats]);
  const progs=Object.values(data.pr[store.n]||{});
  const tSTD=progs.reduce((s,p)=>{if(div!=="All"&&p.i[2]!==div)return s;if(pl!=="All"&&p.i[5]!==pl)return s;return s+(p.t.STD?.[0]||0)},0);
  const tLY=progs.reduce((s,p)=>{if(div!=="All"&&p.i[2]!==div)return s;if(pl!=="All"&&p.i[5]!==pl)return s;return s+(p.t.STD?.[2]||0)},0);
  const tLCW=progs.reduce((s,p)=>{if(div!=="All"&&p.i[2]!==div)return s;if(pl!=="All"&&p.i[5]!==pl)return s;return s+(p.t.LCW?.[0]||0)},0);
  const avgWk=Math.round(tSTD/13);const wos=avgWk>0?((m.oh||0)/avgWk).toFixed(1):'—';

  return <div><h2 style={{fontSize:22,fontWeight:700,color:C.txt,margin:"0 0 4px"}}>Inventory Overview</h2>
    <p style={{color:C.tm,fontSize:13,margin:"0 0 20px"}}>{store.n} · {store.a}</p>
    <DivFilter div={div} setDiv={setDiv}/><PlFilter pl={pl} setPl={setPl}/>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:12,marginBottom:16}}>
      <MC label="On Hand" value={fmt(m.oh)} sub="units" trend={m.oh_ly?pct(m.oh,m.oh_ly):undefined}/>
      <MC label="In Transit" value={fmt(m.tr)}/><MC label="OH Retail $" value={fmtD(m['oh$'])}/><MC label="WOS" value={wos}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:12,marginBottom:24}}>
      <MC label="STD Sales" value={fmt(Math.round(tSTD))} sub="13W units" trend={tLY?pct(tSTD,tLY):undefined} small/>
      <MC label="Avg Wk" value={fmt(avgWk)} sub="units/wk" small/><MC label="LCW" value={fmt(Math.round(tLCW))} small/>
      {m.cost?<MC label="OH Cost" value={fmtD(m.cost)} small/>:null}
    </div>
    {pieData.length>0&&<div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:"20px 24px",boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
      <div style={{fontSize:11,color:C.td,textTransform:"uppercase",letterSpacing:".08em",fontFamily:"'JetBrains Mono',monospace",marginBottom:14}}>{div==="All"?"OH by Division":`OH by Category — ${div}`}</div>
      <MiniPie data={pieData}/></div>}
  </div>;
}

// ═══ TOP PROGRAMS ═══
function Programs({store,data}){
  const[div,setDiv]=useState("All");const[pl,setPl]=useState("All");const[tf,setTf]=useState("L4W");const[vm,setVm]=useState("style");const[expId,setExpId]=useState(null);
  const{styleProgs,skuProgs}=useMemo(()=>{
    const raw=Object.entries(data.pr[store.n]||{});const wkDiv=tf==="LCW"?1:tf==="L4W"?4:tf==="L8W"?8:tf==="L12W"?12:13;
    const skus=raw.map(([sku,p])=>{const tfD=p.t[tf]||[0,0,0,0,0,0];const oh=p.oh||0,tr=p.tr||0,avail=oh+tr;const wkR=tfD[0]/wkDiv;const n8=Math.round(wkR*8);const gap=Math.max(0,n8-avail);const health=avail>=n8?"Healthy":avail>=n8*.6?"At Risk":"Critical";const hasAct=Object.values(p.sz||{}).some(sd=>{const w=(tf==="LCW"?sd[5]:tf==="L4W"?sd[4]:sd[3])/wkDiv;const nd=Math.round(w*8),av=sd[0]+sd[1],g=Math.max(0,nd-av);return g>0&&sd[2]>0});return{sku,name:p.i[0],color:p.i[1],div:p.i[2],cat:p.i[3],pl:p.i[5],units:tfD[0],sales$:tfD[1],unitsLY:tfD[2],salesLY$:tfD[3],oh,tr,avail,wkRate:wkR,need8w:n8,gap,health,hasAct,sizes:p.sz||{},tfD}}).filter(p=>{if(div!=="All"&&p.div!==div)return false;if(pl!=="All"&&p.pl!==pl)return false;return p.units>0||p.oh>0}).sort((a,b)=>b.units-a.units);
    const sm={};skus.forEach(s=>{if(!sm[s.name])sm[s.name]={name:s.name,div:s.div,cat:s.cat,pl:s.pl,units:0,sales$:0,unitsLY:0,salesLY$:0,oh:0,tr:0,gap:0,colors:[],hasAct:false};const st=sm[s.name];st.units+=s.units;st.sales$+=s.sales$;st.unitsLY+=s.unitsLY;st.salesLY$+=s.salesLY$;st.oh+=s.oh;st.tr+=s.tr;st.gap+=s.gap;if(s.hasAct)st.hasAct=true;st.colors.push(s)});
    return{styleProgs:Object.values(sm).sort((a,b)=>b.units-a.units),skuProgs:skus};
  },[data,store,div,pl,tf]);
  const items=vm==="style"?styleProgs:skuProgs;

  return <div><h2 style={{fontSize:22,fontWeight:700,color:C.txt,margin:"0 0 4px"}}>Top Programs</h2>
    <p style={{color:C.tm,fontSize:13,margin:"0 0 20px"}}>Ranked by {tf} units</p>
    <DivFilter div={div} setDiv={setDiv}/><PlFilter pl={pl} setPl={setPl}/><TfFilter tf={tf} setTf={setTf}/>
    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:16}}>
      <span style={{fontSize:10,color:C.td,fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",minWidth:62}}>View</span>
      <Pill active={vm==="style"} onClick={()=>{setVm("style");setExpId(null)}} small>By Program</Pill>
      <Pill active={vm==="sku"} onClick={()=>{setVm("sku");setExpId(null)}} small>By SKU</Pill>
      <span style={{marginLeft:12,fontSize:11,color:C.td,fontFamily:"'JetBrains Mono',monospace"}}>{items.length} {vm==="style"?"programs":"SKUs"}</span>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {items.slice(0,50).map((p,idx)=>{const id=vm==="style"?p.name:p.sku;const exp=expId===id;const lyT=p.unitsLY?pct(p.units,p.unitsLY):null;
        return <div key={id} style={{background:C.card,border:`1px solid ${exp?C.ac+"66":C.brd}`,borderRadius:12,overflow:"hidden",transition:"border-color .2s",boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
          <div className="pr" onClick={()=>setExpId(exp?null:id)} style={{padding:"14px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
            <span style={{fontSize:12,fontWeight:700,color:C.coral,fontFamily:"'JetBrains Mono',monospace",minWidth:28}}>#{idx+1}</span>
            <div style={{flex:1,minWidth:160}}><div style={{fontSize:13,fontWeight:600,color:C.txt}}>{p.name}</div><div style={{fontSize:10,color:C.td,marginTop:2,fontFamily:"'JetBrains Mono',monospace"}}>{vm==="sku"?`${p.color} · `:""}{p.div} · {p.cat}{vm==="style"&&p.colors?` · ${p.colors.length} color${p.colors.length>1?"s":""}`:""}</div></div>
            <div style={{textAlign:"right",minWidth:70}}><div style={{fontSize:16,fontWeight:700,color:C.txt}}>{Math.round(p.units)}</div><div style={{fontSize:9,color:C.td}}>{tf}</div></div>
            {lyT!=null&&<span style={{fontSize:10,fontWeight:600,color:parseFloat(lyT)>=0?C.g:C.r,fontFamily:"'JetBrains Mono',monospace"}}>{parseFloat(lyT)>=0?"▲":"▼"}{Math.abs(parseFloat(lyT))}%</span>}
            <div style={{display:"flex",gap:12}}><div style={{textAlign:"center"}}><div style={{fontSize:11,fontWeight:600,color:C.tm}}>{p.oh}</div><div style={{fontSize:8,color:C.td}}>OH</div></div><div style={{textAlign:"center"}}><div style={{fontSize:11,fontWeight:600,color:p.gap>0?C.r:C.g}}>{p.gap}</div><div style={{fontSize:8,color:C.td}}>Gap</div></div></div>
            {p.hasAct&&<span style={{padding:"3px 8px",borderRadius:5,background:C.coralL,color:C.coral,fontSize:10,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>★</span>}
            <span style={{fontSize:12,color:C.td,transform:exp?"rotate(180deg)":"none",transition:"transform .2s",display:"inline-block"}}>▾</span>
          </div>
          {exp&&<div style={{padding:"0 18px 18px",borderTop:`1px solid ${C.brd}`}}>
            {vm==="style"&&p.colors&&<div style={{marginTop:12}}><div style={{fontSize:10,color:C.td,fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",marginBottom:8}}>By Color / SKU</div>
              {p.colors.sort((a,b)=>b.units-a.units).map(c=>{const cly=c.unitsLY?pct(c.units,c.unitsLY):null;return <div key={c.sku} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:`1px solid ${C.brd}33`,flexWrap:"wrap"}}><div style={{flex:1,minWidth:140}}><span style={{fontSize:12,color:C.txt,fontWeight:500}}>{c.color}</span><span style={{fontSize:10,color:C.td,marginLeft:8}}>{c.sku}</span></div><span style={{fontSize:12,fontWeight:600,color:C.txt}}>{Math.round(c.units)}u</span>{cly!=null&&<span style={{fontSize:10,color:parseFloat(cly)>=0?C.g:C.r}}>{parseFloat(cly)>=0?"▲":"▼"}{Math.abs(parseFloat(cly))}%</span>}<span style={{fontSize:10,color:C.tm}}>OH:{c.oh}</span><HB score={c.health}/></div>})}</div>}
            {vm==="sku"&&<div><div style={{display:"flex",gap:20,padding:"14px 0 8px",flexWrap:"wrap"}}><div><span style={{fontSize:10,color:C.td}}>Wk Rate</span><div style={{fontSize:13,fontWeight:600,color:C.txt}}>{p.wkRate.toFixed(1)} u/wk</div></div><div><span style={{fontSize:10,color:C.td}}>8W Need</span><div style={{fontSize:13,fontWeight:600,color:C.txt}}>{p.need8w}</div></div><div><span style={{fontSize:10,color:C.td}}>Available</span><div style={{fontSize:13,fontWeight:600,color:C.txt}}>{p.avail}</div></div><div><span style={{fontSize:10,color:C.td}}>Gap</span><div style={{fontSize:13,fontWeight:600,color:p.gap>0?C.r:C.g}}>{p.gap>0?`-${p.gap}`:"OK"}</div></div><div><span style={{fontSize:10,color:C.td}}>Sales $</span><div style={{fontSize:13,fontWeight:600,color:C.txt}}>{fmtD(p.sales$)}</div></div></div><SizeGrid sizes={p.sizes} tf={tf}/></div>}
          </div>}
        </div>})}
    </div>
  </div>;
}

// ═══ OPPORTUNITIES ═══
function Opps({store,data}){
  const[div,setDiv]=useState("All");const[expId,setExpId]=useState(null);
  const opps=useMemo(()=>{
    const storeSkus=new Set(Object.keys(data.pr[store.n]||{}));const storeStyles=new Set();
    for(const p of Object.values(data.pr[store.n]||{}))storeStyles.add(p.i[0]);
    const locNames=data.loc_names||[];const chainSales={};
    for(const[sn,progs] of Object.entries(data.pr)){if(sn===store.n)continue;
      for(const[sku,p] of Object.entries(progs)){if(p.i[5]!=="Full Price")continue;const sty=p.i[0];const isLoc=locNames.some(ln=>ln.length>3&&sty.toLowerCase().includes(ln.toLowerCase()));if(isLoc){if(!(store.n.length>3&&sty.toLowerCase().includes(store.n.toLowerCase())))continue}if(["MISC","Please Review","Non Apparel"].includes(p.i[2]))continue;if(!chainSales[sku])chainSales[sku]={u:0,cnt:0,i:p.i,sty};chainSales[sku].u+=(p.t.L4W?.[0]||0);chainSales[sku].cnt++}}
    return Object.entries(chainSales).filter(([sku])=>!storeSkus.has(sku)).map(([sku,cs])=>{const avg=cs.cnt?cs.u/cs.cnt:0;const aff=storeStyles.has(cs.sty);const score=avg*(aff?1.5:1);return{sku,name:cs.i[0],color:cs.i[1],div:cs.i[2],cat:cs.i[3],pl:cs.i[5],chainAvg:Math.round(avg),storeCount:cs.cnt,recUnits:Math.round(avg*1.1),score,aff,priority:score>12?"High":score>6?"Medium":"Low"}}).filter(o=>{if(div!=="All"&&o.div!==div)return false;return o.chainAvg>=3}).sort((a,b)=>b.score-a.score);
  },[data,store,div]);

  return <div><h2 style={{fontSize:22,fontWeight:700,color:C.txt,margin:"0 0 4px"}}>Receipt Opportunities</h2>
    <p style={{color:C.tm,fontSize:13,margin:"0 0 20px"}}>Full Price SKUs selling well across the fleet that {store.n} doesn't carry</p>
    <DivFilter div={div} setDiv={setDiv}/>
    <div style={{fontSize:11,color:C.td,marginBottom:12,fontFamily:"'JetBrains Mono',monospace"}}>{opps.length} opportunities</div>
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {opps.slice(0,40).map(o=>{const exp=expId===o.sku;const pc=o.priority==="High"?C.coral:o.priority==="Medium"?C.y:C.tm;const pbg=o.priority==="High"?C.coralL:o.priority==="Medium"?C.yL:C.cardAlt;
        return <div key={o.sku} style={{background:C.card,border:`1px solid ${exp?C.coral+"44":C.brd}`,borderRadius:12,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
          <div className="pr" onClick={()=>setExpId(exp?null:o.sku)} style={{padding:"14px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
            <span style={{padding:"3px 10px",borderRadius:6,background:pbg,color:pc,fontSize:10,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{o.priority}</span>
            <div style={{flex:1,minWidth:160}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:13,fontWeight:600,color:C.txt}}>{o.name}</span>{o.aff&&<span style={{padding:"1px 8px",borderRadius:4,background:C.gL,color:C.g,fontSize:9,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>PROGRAM FIT</span>}</div><div style={{fontSize:10,color:C.td,marginTop:2,fontFamily:"'JetBrains Mono',monospace"}}>{o.color} · {o.div} · {o.cat}</div></div>
            <div style={{display:"flex",gap:16,alignItems:"center"}}><div style={{textAlign:"center"}}><div style={{fontSize:13,fontWeight:600,color:C.tm}}>{o.chainAvg}</div><div style={{fontSize:8,color:C.td}}>Peer L4W</div></div><div style={{textAlign:"center"}}><div style={{fontSize:13,fontWeight:600,color:C.tm}}>{o.storeCount}</div><div style={{fontSize:8,color:C.td}}>Stores</div></div><div style={{textAlign:"center"}}><div style={{fontSize:13,fontWeight:600,color:C.ac}}>{o.recUnits}</div><div style={{fontSize:8,color:C.td}}>Rec'd</div></div></div>
            <span style={{fontSize:12,color:C.td,transform:exp?"rotate(180deg)":"none",transition:"transform .2s",display:"inline-block"}}>▾</span>
          </div>
          {exp&&<div style={{padding:"6px 18px 16px",borderTop:`1px solid ${C.brd}`,fontSize:12,color:C.tm,lineHeight:1.6}}><strong style={{color:C.txt}}>{o.name}</strong> ({o.color}) averages <strong style={{color:C.txt}}>{o.chainAvg} units L4W</strong> across {o.storeCount} stores. {o.aff?"This store sells other colors — strong program fit.":"New program."} Rec: <strong style={{color:C.ac}}>{o.recUnits} units</strong>.</div>}
        </div>})}
    </div>
  </div>;
}

// ═══ SIDEBAR + STORE VIEW ═══
const NAV=[{k:"home",l:"Dashboard",i:"◻"},{k:"programs",l:"Top Programs",i:"▤"},{k:"opps",l:"Opportunities",i:"◈"}];

function StoreView({store,data,onBack}){
  const[nav,setNav]=useState("home");const[col,setCol]=useState(false);
  return <div style={{display:"flex",minHeight:"100vh",background:C.bg,paddingTop:52}}>
    <div style={{width:col?56:220,background:C.srf,borderRight:`1px solid ${C.brd}`,display:"flex",flexDirection:"column",transition:"width .25s",flexShrink:0,position:"fixed",top:52,bottom:0,overflow:"hidden",zIndex:99}}>
      <div style={{padding:col?"16px 8px":"20px 16px",borderBottom:`1px solid ${C.brd}`}}>
        <button onClick={()=>setCol(!col)} style={{background:"none",border:"none",color:C.tm,fontSize:16,padding:4,display:"block",width:"100%",textAlign:col?"center":"left"}}>{col?"☰":"◁"}</button>
        {!col&&<F><div style={{fontSize:15,fontWeight:700,color:C.txt,marginTop:12}}>{store.n}</div><div style={{fontSize:11,color:C.td,fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{store.a}</div></F>}
      </div>
      <div style={{padding:"12px 8px",flex:1}}>{NAV.map(item=><button key={item.k} className="nb" onClick={()=>setNav(item.k)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:col?"10px 0":"10px 12px",justifyContent:col?"center":"flex-start",background:nav===item.k?C.acl:"transparent",border:"none",borderRadius:8,color:nav===item.k?C.ac:C.tm,fontSize:13,fontWeight:nav===item.k?600:400,marginBottom:4}}><span style={{fontSize:16,width:20,textAlign:"center",flexShrink:0}}>{item.i}</span>{!col&&item.l}</button>)}</div>
      <div style={{padding:"12px 8px",borderTop:`1px solid ${C.brd}`}}><button className="nb" onClick={onBack} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:col?"10px 0":"10px 12px",justifyContent:col?"center":"flex-start",background:"transparent",border:"none",borderRadius:8,color:C.td,fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}><span style={{fontSize:14}}>←</span>{!col&&"Fleet"}</button></div>
    </div>
    <div style={{flex:1,marginLeft:col?56:220,padding:"28px 32px",maxWidth:1200,overflowX:"hidden",transition:"margin-left .25s"}}>
      {nav==="home"&&<Home store={store} data={data}/>}
      {nav==="programs"&&<Programs store={store} data={data}/>}
      {nav==="opps"&&<Opps store={store} data={data}/>}
    </div>
  </div>;
}

function App(){
  const{data,loading,error}=useData();const[store,setStore]=useState(null);
  if(loading)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg}}><div style={{textAlign:"center"}}><div className="spin" style={{width:32,height:32,border:`3px solid ${C.brd}`,borderTopColor:C.ac,borderRadius:"50%",margin:"0 auto 16px"}}/><div style={{color:C.tm,fontSize:13}}>Loading Faherty data...</div></div></div>;
  if(error)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg}}><div style={{textAlign:"center",maxWidth:400}}><div style={{fontSize:32,marginBottom:16}}>⚠</div><div style={{color:C.r,fontSize:14,marginBottom:8}}>Failed to load data</div><div style={{color:C.tm,fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>{error}</div></div></div>;
  return <F><TopBar data={data}/>{store?<StoreView store={store} data={data} onBack={()=>setStore(null)}/>:<Landing stores={data.st} stot={data.stot||{}} sa={data.sa||{}} onSelect={setStore} dataDate={data.dt} data={data}/>}</F>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
